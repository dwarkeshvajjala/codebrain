   margin: 14px 0;\n      padding: 16px;\n      border-radius: 8px;\n      overflow: auto;\n      background: var(--code);\n      color: var(--code-ink);\n    }\n    .md pre code {\n      padding: 0;\n      background: transparent;\n      color: inherit;\n    }\n    .md table {\n      border-collapse: collapse;\n      width: 100%;\n      margin: 16px 0;\n      display: block;\n      overflow-x: auto;\n    }\n    .md th, .md td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; }\n    .md blockquote {\n      margin: 14px 0;\n      padding: 8px 14px;\n      border-left: 4px solid var(--accent);\n      color: var(--muted);\n      background: var(--accent-2);\n    }\n    @media (max-width: 820px) {\n      .app { display: block; }\n      aside { position: relative; height: auto; }\n      main { padding: 20px; }\n      .topbar { display: block; }\n      .actions { justify-content: flex-start; margin-top: 14px; }\n      .content { padding: 18px; }\n    }\n  \u003c/style>\n\u003c/head>\n\u003cbody>\n  \u003cdiv class=\"app\">\n    \u003caside>\n      \u003cdiv class=\"brand\">\n        \u003cdiv class=\"mark\" aria-hidden=\"true\">\u003c/div>\n        \u003cdiv>\n          \u003ch1>Code Brain\u003c/h1>\n          \u003cp class=\"sub\">Projects, patterns, and reusable implementation memory.\u003c/p>\n        \u003c/div>\n      \u003c/div>\n      \u003cinput id=\"search\" class=\"search\" type=\"search\" placeholder=\"Search projects or markdown\">\n      \u003cdiv id=\"projectList\" class=\"project-list\">\u003c/div>\n    \u003c/aside>\n    \u003cmain>\n      \u003csection class=\"topbar\">\n        \u003cdiv class=\"title\">\n          \u003ch2 id=\"projectTitle\">No projects yet\u003c/h2>\n          \u003cp id=\"projectSummary\">Import a repository to generate markdown knowledge files.\u003c/p>\n        \u003c/div>\n        \u003cdiv class=\"actions\">\n          \u003cbutton class=\"action\" id=\"copyImport\">Copy import command\u003c/button>\n          \u003cbutton class=\"action\" id=\"copyUpload\">Copy Claude upload checklist\u003c/button>\n        \u003c/div>\n      \u003c/section>\n      \u003cnav id=\"tabs\" class=\"tabs\">\u003c/nav>\n      \u003carticle id=\"content\" class=\"content empty\">Run \u003ccode>npm run import -- &lt;github-url&gt;\u003c/code> or \u003ccode>npm run all -- &lt;repos-folder&gt;\u003c/code>.\u003c/article>\n    \u003c/main>\n  \u003c/div>\n  \u003cscript>\n    const PROJECTS = ${safeJson(projects)};\n    let selectedProject = PROJECTS[0]?.slug || '';\n    let selectedSection = '00-overview';\n\n    const el = {\n      list: document.getElementById('projectList'),\n      search: document.getElementById('search'),\n      title: document.getElementById('projectTitle'),\n      summary: document.getElementById('projectSummary'),\n      tabs: document.getElementById('tabs'),\n      content: document.getElementById('content'),\n      copyImport: document.getElementById('copyImport'),\n      copyUpload: document.getElementById('copyUpload'),\n    };\n\n    function escapeHtml(text) {\n      return String(text)\n        .replace(/&/g, '&amp;')\n        .replace(/\u003c/g, '&lt;')\n        .replace(/>/g, '&gt;')\n        .replace(/\"/g, '&quot;')\n        .replace(/'/g, '&#39;');\n    }\n\n    function inline(text) {\n      return escapeHtml(text)\n        .replace(new RegExp('\\\\\\\\x60([^\\\\\\\\x60]+)\\\\\\\\x60', 'g'), '\u003ccode>$1\u003c/code>')\n        .replace(new RegExp('\\\\\\\\*\\\\\\\\*([^*]+)\\\\\\\\*\\\\\\\\*', 'g'), '\u003cstrong>$1\u003c/strong>')\n        .replace(new RegExp('\\\\\\\\[([^\\\\\\\\]]+)\\\\\\\\]\\\\\\\\(([^)]+)\\\\\\\\)', 'g'), '\u003ca href=\"$2\">$1\u003c/a>');\n    }\n\n    function renderMarkdown(md) {\n      const lines = md.split(/\\\\r?\\\\n/);\n      const out = [];\n      let inCode = false;\n      let listOpen = false;\n      let table = [];\n\n      function closeList() {\n        if (listOpen) out.push('\u003c/ul>');\n        listOpen = false;\n      }\n\n      function flushTable() {\n        if (!table.length) return;\n        out.push('\u003ctable>');\n        table.forEach((row, index) => {\n          if (/^\\\\s*\\\\|?\\\\s*:?-{3,}/.test(row)) return;\n          const cells = row.trim().replace(/^\\\\||\\\\|$/g, '').split('|').map(cell => inline(cell.trim()));\n          out.push('\u003ctr>' + cells.map(cell => index === 0 ? '\u003cth>' + cell + '\u003c/th>' : '\u003ctd>' + cell + '\u003c/td>').join('') + '\u003c/tr>');\n        });\n        out.push('\u003c/table>');\n        table = [];\n      }\n\n      for (const line of lines) {\n        const fence = line.match(new RegExp('^\\\\\\\\x60{3,4}\\\\\\\\w*'));\n        if (fence) {\n          flushTable();\n          closeList();\n          if (!inCode) out.push('\u003cpre>\u003ccode>');\n          else out.push('\u003c/code>\u003c/pre>');\n          inCode = !inCode;\n          continue;\n        }\n        if (inCode) {\n          out.push(escapeHtml(line) + '\\\\n');\n          continue;\n        }\n        if (/^\\\\|.+\\\\|$/.test(line.trim())) {\n          closeList();\n          table.push(line);\n          continue;\n        }\n        flushTable();\n        if (!line.trim()) {\n          closeList();\n          continue;\n        }\n        if (line.startsWith('### ')) { closeList(); out.push('\u003ch3>' + inline(line.slice(4)) + '\u003c/h3>'); continue; }\n        if (line.startsWith('## ')) { closeList(); out.push('\u003ch2>' + inline(line.slice(3)) + '\u003c/h2>'); continue; }\n        if (line.startsWith('# ')) { closeList(); out.push('\u003ch1>' + inline(line.slice(2)) + '\u003c/h1>'); continue; }\n        if (line.startsWith('> ')) { closeList(); out.push('\u003cblockquote>' + inline(line.slice(2)) + '\u003c/blockquote>'); continue; }\n        if (/^[-*]\\\\s+/.test(line)) {\n          if (!listOpen) out.push('\u003cul>');\n          listOpen = true;\n          out.push('\u003cli>' + inline(line.replace(/^[-*]\\\\s+/, '')) + '\u003c/li>');\n          continue;\n        }\n        closeList();\n        out.push('\u003cp>' + inline(line) + '\u003c/p>');\n      }\n      flushTable();\n      closeList();\n      if (inCode) out.push('\u003c/code>\u003c/pre>');\n      return '\u003cdiv class=\"md\">' + out.join('\\\\n') + '\u003c/div>';\n    }\n\n    function currentProject() {\n      return PROJECTS.find(project => project.slug === selectedProject) || PROJECTS[0];\n    }\n\n    function matches(project, query) {\n      if (!query) return true;\n      const haystack = [\n        project.title,\n        project.summary,\n        ...Object.values(project.sections).map(section => section.content)\n      ].join('\\\\n').toLowerCase();\n      return haystack.includes(query.toLowerCase());\n    }\n\n    function renderList() {\n      const query = el.search.value.trim();\n      const visible = PROJECTS.filter(project => matches(project, query));\n      el.list.innerHTML = visible.map(project => \\`\n        \u003cbutton class=\"project-btn \\${project.slug === selectedProject ? 'active' : ''}\" data-project=\"\\${escapeHtml(project.slug)}\">\n          \u003cspan class=\"project-name\">\\${escapeHtml(project.title)}\u003c/span>\n          \u003cspan class=\"project-summary\">\\${escapeHtml(project.summary)}\u003c/span>\n        \u003c/button>\n      \\`).join('') || '\u003cdiv class=\"empty\">No matches.\u003c/div>';\n    }\n\n    function renderProject() {\n      const project = currentProject();\n      if (!project) return;\n      if (!project.sections[selectedSection]) selectedSection = Object.keys(project.sections)[0] || '00-overview';\n      el.title.textContent = project.title;\n      el.summary.textContent = project.summary;\n      el.tabs.innerHTML = Object.entries(project.sections).map(([key, section]) => \\`\n        \u003cbutton class=\"tab \\${key === selectedSection ? 'active' : ''}\" data-section=\"\\${escapeHtml(key)}\">\\${escapeHtml(section.label)}\u003c/button>\n      \\`).join('');\n      const section = project.sections[selectedSection];\n      el.content.className = 'content';\n      el.content.innerHTML = section ? renderMarkdown(section.content) : '\u003cdiv class=\"empty\">No content for this section yet.\u003c/div>';\n      renderList();\n    }\n\n    el.list.addEventListener('click', event => {\n      const button = event.target.closest('[data-project]');\n      if (!button) return;\n      selectedProject = button.dataset.project;\n      selectedSection = '00-overview';\n      renderProject();\n    });\n\n    el.tabs.addEventListener('click', event => {\n      const button = event.target.closest('[data-section]');\n      if (!button) return;\n      selectedSection = button.dataset.section;\n      renderProject();\n    });\n\n    el.search.addEventListener('input', renderList);\n\n    el.copyImport.addEventListener('click', async () => {\n      await navigator.clipboard.writeText('npm run import -- https://github.com/owner/repo');\n      el.copyImport.textContent = 'Copied';\n      setTimeout(() => el.copyImport.textContent = 'Copy import command', 1200);\n    });\n\n    el.copyUpload.addEventListener('click', async () => {\n      const project = currentProject();\n      const text = project\n        ? \\`Upload these markdown files for \\${project.slug}:\\\\nbrain/projects/\\${project.slug}/00-overview.md\\\\nbrain/projects/\\${project.slug}/01-architecture.md\\\\nbrain/projects/\\${project.slug}/02-packages.md\\\\nbrain/projects/\\${project.slug}/03-implementations.md\\\\nbrain/projects/\\${project.slug}/04-gotchas.md\\`\n        : 'Upload 00-overview.md through 04-gotchas.md from each brain/projects/* folder.';\n      await navigator.clipboard.writeText(text);\n      el.copyUpload.textContent = 'Copied';\n      setTimeout(() => el.copyUpload.textContent = 'Copy Claude upload checklist', 1200);\n    });\n\n    renderProject();\n  \u003c/script>\n\u003c/body>\n\u003c/html>`;\n}\n\nconst projects = loadProjects();\nrebuildMarkdownIndex(projects);\nconst outPath = path.join(brainDir, 'index.html');\nfs.writeFileSync(outPath, html(projects));\nconsole.log(`Dashboard generated -> ${outPath}`);\nconsole.log(`Projects: ${projects.length}`);\n\n````\n\n### scripts\\load-env.js\n\n````javascript\nconst fs = require('fs');\nconst path = require('path');\n\nfunction loadEnv(file = path.resolve('.env')) {\n  if (!fs.existsSync(file)) return;\n\n  const lines = fs.readFileSync(file, 'utf8').split(/\\r?\\n/);\n  for (const line of lines) {\n    const trimmed = line.trim();\n    if (!trimmed || trimmed.startsWith('#')) continue;\n\n    const idx = trimmed.indexOf('=');\n    if (idx === -1) continue;\n\n    const key = trimmed.slice(0, idx).trim();\n    let value = trimmed.slice(idx + 1).trim();\n    if (!key || process.env[key]) continue;\n\n    if ((value.startsWith('\"') && value.endsWith('\"')) || (value.startsWith(\"'\") && value.endsWith(\"'\"))) {\n      value = value.slice(1, -1);\n    }\n\n    process.env[key] = value;\n  }\n}\n\nmodule.exports = { loadEnv };\n\n````\n\n### scripts\\new-idea.js\n\n````javascript\n#!/usr/bin/env node\r\n/**\r\n * new-idea.js\r\n * Generate a structured idea document for the brain (the \"grows over time\" part).\r\n * Pulls the brain index for context so ideas connect to what you already built.\r\n *\r\n * Setup (Node 18+):  export GROQ_API_KEY=...\r\n *\r\n * Usage:\r\n *   node new-idea.js \"AI resume tailor\"\r\n *   node new-idea.js \"AI resume tailor\" --desc \"tailors my resume per job description\"\r\n *   node new-idea.js \"X\" --out ./brain --model openai/gpt-oss-120b\r\n */\r\n\r\nconst fs = require('fs');\nconst path = require('path');\nconst { loadEnv } = require('./load-env');\n\nloadEnv();\n\r\n// ---------- args ----------\r\nconst USAGE = `Usage: node scripts/new-idea.js \"\u003cidea title>\" [--desc \"...\"] [--out ./brain] [--model name]\r\n\r\nOptions:\r\n  --desc text    Short description to guide the idea plan.\r\n  --out dir      Brain folder. Default: ./brain.\r\n  --model name   Groq model to use. Default: llama-3.3-70b-versatile.\r\n  -h, --help     Show this help.`;\r\n\r\nconst args = process.argv.slice(2);\r\nlet title = null;\r\nlet desc = '';\r\nlet brainDir = path.resolve('./brain');\r\nlet model = 'llama-3.3-70b-versatile';\r\n\r\nfunction readOptionValue(flag, index) {\r\n  const value = args[index + 1];\r\n  if (!value || value.startsWith('--')) {\r\n    console.error(`Missing value for ${flag}\\n\\n${USAGE}`);\r\n    process.exit(1);\r\n  }\r\n  return value;\r\n}\r\n\r\nif (args.includes('-h') || args.includes('--help')) {\r\n  console.log(USAGE);\r\n  process.exit(0);\r\n}\r\n\r\nfor (let i = 0; i \u003c args.length; i++) {\r\n  const a = args[i];\r\n  if (a === '--desc') desc = readOptionValue(a, i++);\r\n  else if (a === '--out') brainDir = path.resolve(readOptionValue(a, i++));\r\n  else if (a === '--model') model = readOptionValue(a, i++);\r\n  else if (a.startsWith('--')) {\r\n    console.error(`Unknown option: ${a}\\n\\n${USAGE}`);\r\n    process.exit(1);\r\n  }\r\n  else if (!a.startsWith('--') && !title) title = a;\r\n  else {\r\n    console.error(`Unexpected argument: ${a}\\n\\n${USAGE}`);\r\n    process.exit(1);\r\n  }\r\n}\r\n\r\nif (!title) {\r\n  console.error(USAGE);\r\n  process.exit(1);\r\n}\r\nif (!process.env.GROQ_API_KEY) {\r\n  console.error('Missing GROQ_API_KEY environment variable.');\r\n  process.exit(1);\r\n}\r\n\r\n// ---------- context from existing brain ----------\r\nlet indexContext = '';\r\nconst readme = path.join(brainDir, 'README.md');\r\nif (fs.existsSync(readme)) indexContext = fs.readFileSync(readme, 'utf8').slice(0, 4000);\r\n\r\nconst date = new Date().toISOString().slice(0, 10);\r\nconst slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');\r\n\r\nconst prompt = `You are a pragmatic senior engineer helping plan a new project idea.\r\n\r\nExisting projects in this developer's brain (for reuse and context):\r\n${indexContext || '(none yet)'}\r\n\r\nNew idea title: ${title}\r\n${desc ? `Short description: ${desc}` : ''}\r\n\r\nWrite ONE concise, scannable markdown plan. Short bullets, short lines, grouped. No long paragraphs.\r\nWhere useful, point to which existing project's patterns could be reused.\r\nUse these sections exactly:\r\n\r\n# ${title}\r\n\r\n## Problem / why\r\n## Core idea\r\n## Suggested stack\r\n## Build phases\r\n## Reuse from existing projects\r\n## Risks / open questions\r\n## First concrete step`;\r\n\r\nasync function main() {\r\n  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {\r\n    method: 'POST',\r\n    headers: {\r\n      'Content-Type': 'application/json',\r\n      Authorization: `Bearer ${process.env.GROQ_API_KEY}`,\r\n    },\r\n    body: JSON.stringify({\r\n      model,\r\n      temperature: 0.4,\r\n      messages: [{ role: 'user', content: prompt }],\r\n    }),\r\n  });\r\n\r\n  if (!res.ok) {\r\n    console.error(`Groq error ${res.status}: ${await res.text()}`);\r\n    process.exit(1);\r\n  }\r\n\r\n  const data = await res.json();\r\n  const text = (data.choices?.[0]?.message?.content || '').trim();\r\n\r\n  const ideasDir = path.join(brainDir, 'ideas');\r\n  fs.mkdirSync(ideasDir, { recursive: true });\r\n  const outPath = path.join(ideasDir, `${date}-${slug}.md`);\r\n  fs.writeFileSync(outPath, text + '\\n');\r\n  console.log(`Idea saved -> ${outPath}`);\r\n}\r\n\r\nmain().catch(err => {\r\n  console.error(err);\r\n  process.exit(1);\r\n});\r\n\n````\n\n### SETUP.md\n\n````markdown\n# Code Brain - Setup & Usage\n\nA personal knowledge base built from your own shipped repos. Give it a GitHub repo or local folder, and it creates markdown files you can browse, upload to Claude Project knowledge, or reuse while planning new work.\n\n## What You Need\n\n- Node.js 18 or newer.\n- Git installed and available in your terminal.\n- A Groq API key for the AI refine step: https://console.groq.com\n- No npm packages to install.\n\n## Step 0 - Set Your Key\n\nPowerShell:\n\n```powershell\n$env:GROQ_API_KEY=\"your_key_here\"\n```\n\nMac/Linux:\n\n```bash\nexport GROQ_API_KEY=your_key_here\n```\n\nUse `--bundle-only` when you want to create raw context without an API key.\n\n## Best Flow - Import One GitHub Repo\n\n```bash\nnpm run import -- https://github.com/owner/repo\n```\n\nWhat happens:\n\n- The repo is cloned or updated under `brain/_repos/`.\n- A raw context file is created under `brain/_staging/`.\n- Groq turns that context into five markdown files under `brain/projects/\u003crepo>/`.\n- `brain/README.md` and `brain/index.html` are regenerated.\n\nUseful options:\n\n```bash\nnpm run import -- https://github.com/owner/repo --fresh\nnpm run import -- https://github.com/owner/repo --bundle-only\nnpm run import -- https://github.com/owner/repo --model openai/gpt-oss-120b\n```\n\n## Browse the Brain\n\n```bash\nnpm run ui\n```\n\nThen open:\n\n```text\nbrain/index.html\n```\n\nThe dashboard gives you:\n\n- Project cards with summaries.\n- Search across project names and markdown.\n- Tabs for overview, architecture, packages, implementations, gotchas, and raw context.\n- A quick checklist for which files to upload to Claude Project knowledge.\n\n## Build From Local Repos\n\nBundle one local repo:\n\n```bash\nnpm run bundle -- /path/to/one-repo\n```\n\nRefine an existing context file:\n\n```bash\nnpm run refine -- /path/to/one-repo/one-repo.context.md\n```\n\nBuild every repo inside a parent folder:\n\n```bash\nnpm run all -- /path/to/all-my-repos\n```\n\nSkip the AI step:\n\n```bash\nnpm run all -- /path/to/all-my-repos --bundle-only\n```\n\n## Generated Files\n\nEach refined project gets:\n\n- `00-overview.md` - purpose, stack, status, useful entry points.\n- `01-architecture.md` - folders, layers, request/data flow.\n- `02-packages.md` - significant dependencies and why they matter.\n- `03-implementations.md` - working patterns with real code snippets.\n- `04-gotchas.md` - decisions, pitfalls, and deployment notes.\n- `raw.context.md` - full bundled source context for deep follow-up.\n\n## Use With Claude\n\n1. Create a Claude Project called `My Code Brain`.\n2. Upload `00-overview.md` through `04-gotchas.md` from each project folder.\n3. Keep `raw.context.md` local unless you need deep source detail.\n\nGood questions:\n\n- \"Which project used Supabase Realtime and how?\"\n- \"Show the exact auth pattern I used before.\"\n- \"Compare the backend architecture in these two projects.\"\n- \"What code can I reuse for this new idea?\"\n\n## Capture New Ideas\n\n```bash\nnpm run idea -- \"AI resume tailor\" --desc \"tailors my resume per job description\"\n```\n\nThis creates:\n\n```text\nbrain/ideas/YYYY-MM-DD-ai-resume-tailor.md\n```\n\n## Write Reusable Patterns\n\nWhen you solve the same thing twice, copy:\n\n```text\nbrain/patterns/_TEMPLATE.md\n```\n\nExamples:\n\n- `auth-jwt-httponly.md`\n- `nl2sql-groq.md`\n- `supabase-realtime.md`\n\n## Troubleshooting\n\n- `Missing GROQ_API_KEY`: set the key or pass `--bundle-only`.\n- `context was truncated`: raise `--maxchars` or split a huge repo.\n- `No project folders found`: pass a parent folder that contains repo folders.\n- `git clone` fails: check the repo URL and whether you have access.\n- A file is too big and got skipped: check the `Skipped large files` section in `raw.context.md`.\n\n## When to Upgrade to Real RAG\n\nThe markdown brain is enough until:\n\n- Claude Project uploads become too large.\n- Answers get fuzzy because too many projects are loaded.\n- You want app/API retrieval instead of manual upload.\n\nThen move to: chunk markdown, embed chunks, store in Supabase pgvector, and query through a small Express endpoint.\n\n````\n"}}},{"slug":"interviewmentor","title":"interviewMentor","summary":"Personal interview-prep coach named Mentor.","sections":{"00-overview":{"label":"Overview","content":"# interviewMentor - Overview\r\n\r\n- Personal interview-prep coach named Mentor.\r\n- Daily driver gives 3 tasks: Code, Learn, Speak.\r\n- Tracks daily completion, energy/mood, learning notes, questions, applications, speaking practice, and progress.\r\n- Tech stack: React 18 + Vite client, Express backend, Supabase Postgres, Groq chat completions, optional Notion REST sync.\r\n- Source of truth: Supabase. Notion is a one-way reading/notes layer.\r\n- Secrets stay on the backend. The frontend sends a light `x-app-passcode` header.\r\n- Status: functional six-tab app; README says the tabs talk to a real backend and are not mocks.\r\n- Git URL: TODO\r\n\r\n## Main Screens\r\n\r\n- `Today`: load or seed the day, choose mode, record energy/mood, toggle tasks, send notes, re-plan with AI, close the day.\r\n- `Roadmap`: reads the 90-day spine and consistency rules.\r\n- `Questions`: question bank with status cycling and saved answers.\r\n- `Applications`: job tracker with pipeline status counts.\r\n- `Speaking`: recording log plus Groq-generated 4-question mock.\r\n- `Progress`: streak, points, days engaged, question confidence, applications count.\r\n\r\n## Useful Entry Points\r\n\r\n- Client app: `client/src/App.jsx`\r\n- API wrapper: `client/src/api.js`\r\n- Backend app: `server/src/index.js`\r\n- Daily flow: `server/src/routes/today.js`\r\n- AI flow: `server/src/routes/ai.js`\r\n- Planner: `server/src/planner.js`\r\n- DB schema: `server/db/schema.sql`\r\n- Raw context: `raw.context.md`\r\n"},"01-architecture":{"label":"Architecture","content":"# interviewMentor - Architecture\r\n\r\n## Folder Layout\r\n\r\n- `client/`: Vite React app.\r\n- `client/src/api.js`: single fetch wrapper used by every page.\r\n- `client/src/components/States.jsx`: shared loading, error, and inline notice UI.\r\n- `client/src/pages/`: six route-level screens: Today, Roadmap, Questions, Applications, Speaking, Progress.\r\n- `server/`: Express API.\r\n- `server/src/index.js`: app setup, CORS, passcode guard, route mounting.\r\n- `server/src/routes/today.js`: day seeding, task toggles, daily logs, day status.\r\n- `server/src/routes/ai.js`: Groq-backed re-plan, learning feedback, mock interview generation.\r\n- `server/src/routes/data.js`: generic CRUD for questions, applications, recordings plus roadmap/progress reads.\r\n- `server/src/planner.js`: deterministic date-to-plan engine.\r\n- `server/src/groq.js`: plain `fetch` wrapper for Groq chat completions.\r\n- `server/src/notion.js`: optional one-way Notion sync.\r\n- `server/db/schema.sql`: Supabase tables and seed questions.\r\n- `server/src/data/roadmap.json`: 90-day phases and explicit days 1-14.\r\n- `server/src/data/taskBank.json`: generated-day task pools.\r\n\r\n## Request Flow\r\n\r\n- Browser calls `api.*` from `client/src/api.js`.\r\n- `api.js` prefixes `VITE_API_URL` and sends `x-app-passcode`.\r\n- Express checks `APP_PASSCODE` unless the route is `/api/health`.\r\n- Routes call Supabase using the service role client from `server/src/supabase.js`.\r\n- AI routes call Groq from the backend only.\r\n- Notion sync is best-effort and skipped when Notion env vars are absent.\r\n\r\n## Daily Flow\r\n\r\n```text\r\nToday.jsx\r\n  -> api.getToday()\r\n  -> GET /api/today\r\n  -> ensureDay(date)\r\n  -> planForDate(date)\r\n  -> Supabase days/tasks/logs\r\n  -> Today.jsx renders day + tasks + progress chain\r\n```\r\n\r\n## Planning Model\r\n\r\n- `PLAN_START_DATE` defaults to `2026-06-17`.\r\n- Days before the start date return `beforeStart: true`.\r\n- Days 1-14 are explicit rehabilitation days from `roadmap.json`.\r\n- Days 15-90 are generated from current phase, weekday focus, and `taskBank.json`.\r\n- Task picking is deterministic, so the same date produces the same plan.\r\n\r\n## Data Model\r\n\r\n- `days`: one row per calendar day.\r\n- `tasks`: day tasks, usually code/learn/speak.\r\n- `logs`: energy, mood, and reflection by date.\r\n- `notes`: pasted learning notes plus AI feedback.\r\n- `questions`: interview question bank.\r\n- `applications`: job pipeline tracker.\r\n- `recordings`: speaking-practice log.\r\n"},"02-packages":{"label":"Packages","content":"# interviewMentor - Packages\r\n\r\n## Client\r\n\r\n- `react`: builds the UI screens and local component state.\r\n- `react-dom`: mounts the React app.\r\n- `react-router-dom`: tab routes for Today, Roadmap, Questions, Applications, Speaking, Progress.\r\n- `vite`: dev server and production build tool.\r\n- `@vitejs/plugin-react`: React support for Vite.\r\n\r\n## Server\r\n\r\n- `express`: HTTP API and route mounting.\r\n- `cors`: allows the configured frontend origin to call the backend.\r\n- `dotenv`: loads backend environment variables.\r\n- `@supabase/supabase-js`: service-role Supabase client for all DB operations.\r\n\r\n## External APIs Without SDKs\r\n\r\n- Groq uses plain `fetch` against `https://api.groq.com/openai/v1/chat/completions`.\r\n- Notion uses plain `fetch` against `https://api.notion.com/v1/...`.\r\n- This keeps the server dependency list small and avoids SDK-specific abstractions.\r\n\r\n## Runtime Requirements\r\n\r\n- Node 18+.\r\n- Supabase project with `server/db/schema.sql` applied.\r\n- Backend `.env`: `SUPABASE_URL`, `SUPABASE_SERVICE_KEY`, `APP_PASSCODE`.\r\n- AI features also need `GROQ_API_KEY` and optionally `GROQ_MODEL`.\r\n- Notion sync needs `NOTION_TOKEN` and database IDs.\r\n"},"03-implementations":{"label":"Implementations","content":"# interviewMentor - Key Implementations\r\n\r\n## Shared API Wrapper\r\n\r\nAll frontend calls go through one function that adds JSON headers and the passcode.\r\n\r\n```javascript\r\nconst BASE = import.meta.env.VITE_API_URL || 'http://localhost:4000';\r\nconst PASSCODE = import.meta.env.VITE_APP_PASSCODE || '';\r\n\r\nasync function req(path, { method = 'GET', body } = {}) {\r\n  const res = await fetch(BASE + path, {\r\n    method,\r\n    headers: {\r\n      'Content-Type': 'application/json',\r\n      'x-app-passcode': PASSCODE\r\n    },\r\n    body: body ? JSON.stringify(body) : undefined\r\n  });\r\n  const data = await res.json().catch(() => ({}));\r\n  if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);\r\n  return data;\r\n}\r\n```\r\n\r\n## Backend Passcode Guard\r\n\r\nThe API is single-user and uses a simple shared secret. Health checks bypass it.\r\n\r\n```javascript\r\napp.use((req, res, next) => {\r\n  if (req.method === 'OPTIONS') return next();   // CORS preflight\r\n  if (req.path === '/api/health') return next();\r\n  const need = process.env.APP_PASSCODE;\r\n  if (!need) return next();\r\n  if (req.get('x-app-passcode') === need) return next();\r\n  return res.status(401).json({ error: 'Unauthorized' });\r\n});\r\n```\r\n\r\n## Lazy Day Seeding\r\n\r\nOpening Today creates the day row and tasks if they do not already exist.\r\nThe insert path handles React StrictMode-style duplicate requests.\r\n\r\n```javascript\r\nasync function ensureDay(dateStr) {\r\n  const plan = planForDate(dateStr);\r\n  let { data: day } = await supabase.from('days').select('*').eq('the_date', dateStr).maybeSingle();\r\n\r\n  if (!day) {\r\n    const insert = {\r\n      day_index: plan.dayIndex,\r\n      the_date: dateStr,\r\n      week_label: plan.weekLabel,\r\n      phase: plan.phase,\r\n      focus: plan.focus,\r\n      mode: plan.defaultMode || 'normal',\r\n      status: 'pending'\r\n    };\r\n    const { data: created, error: insErr } = await supabase.from('days').insert(insert).select().maybeSingle();\r\n\r\n    if (insErr || !created) {\r\n      const again = await supabase.from('days').select('*').eq('the_date', dateStr).maybeSingle();\r\n      day = again.data;\r\n      if (!day) throw insErr || new Error('Could not create or load the day');\r\n    } else {\r\n      day = created;\r\n      if (plan.tasks?.length) {\r\n        const rows = plan.tasks.map((t, i) => ({\r\n          day_id: day.id, kind: t.kind, title: t.title, detail: t.detail,\r\n          resource_url: t.resource_url || '', minutes: t.minutes || null, position: i\r\n        }));\r\n        await supabase.from('tasks').insert(rows);\r\n      }\r\n    }\r\n  }\r\n```\r\n\r\n## Deterministic Generated Tasks\r\n\r\nDays 15+ combine weekday focus, phase topics, and task-bank fallbacks.\r\n\r\n```javascript\r\nfunction generateTasks(dayIndex, dateStr) {\r\n  const phase = phaseForDay(dayIndex);\r\n  const wd = weekdayTopics(dateStr);\r\n  const seed = dayIndex;\r\n\r\n  const codeTopics  = [...wd.topics, ...(phase ? phase.topics : []), 'csharp', 'sql', 'dotnet', 'dsa'];\r\n  const learnTopics = [...wd.topics, ...(phase ? phase.topics : []), 'dotnet', 'sql', 'csharp'];\r\n\r\n  const code  = firstTopicWithKind(codeTopics, 'code', seed)\r\n             || firstTopicWithKind(codeTopics, 'speak', seed);\r\n  const learn = firstTopicWithKind(learnTopics, 'learn', seed + 1);\r\n  const speakPool = bank.speaking.speak || [];\r\n  const speak = speakPool.length ? speakPool[dayIndex % speakPool.length] : null;\r\n```\r\n\r\n## Groq Wrapper\r\n\r\nThe backend keeps the Groq key private and supports JSON-mode responses.\r\n\r\n```javascript\r\nasync function chat(messages, { json = false, maxTokens = 700 } = {}) {\r\n  if (!process.env.GROQ_API_KEY) {\r\n    return { error: 'GROQ_API_KEY not set in .env' };\r\n  }\r\n  try {\r\n    const res = await fetch(GROQ_URL, {\r\n      method: 'POST',\r\n      headers: {\r\n        'Content-Type': 'application/json',\r\n        Authorization: `Bearer ${process.env.GROQ_API_KEY}`\r\n      },\r\n      body: JSON.stringify({\r\n        model: MODEL,\r\n        temperature: 0.5,\r\n        max_tokens: maxTokens,\r\n        ...(json ? { response_format: { type: 'json_object' } } : {}),\r\n        messages\r\n      })\r\n    });\r\n```\r\n\r\n## AI Re-plan Sanitization\r\n\r\nModel output is trimmed and normalized before replacing tasks.\r\n\r\n```javascript\r\nconst ALLOWED = ['code', 'learn', 'speak'];\r\nconst clean = (out.plan?.tasks || [])\r\n  .filter(t => t && t.title && String(t.title).trim())\r\n  .slice(0, 6)\r\n  .map((t, i) => ({\r\n    day_id: day.id,\r\n    kind: ALLOWED.includes(t.kind) ? t.kind : 'learn',\r\n    title: String(t.title).slice(0, 300),\r\n    detail: t.detail ? String(t.detail).slice(0, 1500) : '',\r\n    minutes: Number.isFinite(Number(t.minutes)) ? Number(t.minutes) : null,\r\n    position: i,\r\n    resource_url: ''\r\n  }));\r\n```\r\n\r\n## Generic CRUD Route Factory\r\n\r\nQuestions, applications, and recordings share a small CRUD router.\r\n\r\n```javascript\r\nfunction crud(table, { syncFn } = {}) {\r\n  const r = Router();\r\n  r.get('/', async (req, res) => {\r\n    const { data, error } = await supabase.from(table).select('*').order('created_at', { ascending: false });\r\n    if (error) return res.status(500).json({ error: error.message });\r\n    res.json({ items: data || [] });\r\n  });\r\n  r.post('/', async (req, res) => {\r\n    const { data, error } = await supabase.from(table).insert(req.body).select().single();\r\n    if (error) return res.status(500).json({ error: error.message });\r\n    if (syncFn) syncFn(data).catch(() => {});\r\n    res.json({ item: data });\r\n  });\r\n```\r\n"},"04-gotchas":{"label":"Gotchas","content":"# interviewMentor - Decisions & Gotchas\r\n\r\n## Decisions\r\n\r\n- Single-user app by design.\r\n- Backend uses Supabase service-role key; the browser never talks to Supabase directly.\r\n- Passcode auth is intentionally light, not multi-user auth.\r\n- Groq and Notion are plain `fetch` integrations, no SDKs.\r\n- AI is an adapter around the roadmap, not the source of truth.\r\n- Notion sync is optional and one-way.\r\n- Missed days are not treated as debt; `rest` and low-energy modes keep the progress model humane.\r\n\r\n## Gotchas\r\n\r\n- If `APP_PASSCODE` is unset, the API is open except for local network/firewall boundaries. Set it before deployment.\r\n- `SUPABASE_URL` and `SUPABASE_SERVICE_KEY` are required for real app usage; missing values only produce a warning at startup.\r\n- `GROQ_API_KEY` is required only for AI features. Without it, normal day/task CRUD still works.\r\n- Notion calls silently skip unless the relevant Notion env vars are set.\r\n- `ensureDay()` seeds tasks only when the day row is created; changing `roadmap.json` later will not automatically update already-created days.\r\n- `PLAN_START_DATE` controls the whole plan index. Moving it after data exists can make old rows inconsistent with the new calendar.\r\n- `TIMEZONE` defaults to `Asia/Kolkata`; this matters because `todayDate()` is timezone-aware.\r\n- AI re-plan replaces the day's tasks after sanitizing the model response. If the model returns no usable tasks, the original plan is kept.\r\n- CRUD routes insert/update `req.body` directly, relying on the single-user trust model and DB schema.\r\n- The schema has no user_id/RLS scoping yet. Adding a second user requires schema and auth changes, as noted in the README.\r\n"},"raw.context":{"label":"Raw Context","content":"# Project Context: interviewMentor\r\n\r\n- Generated: 2026-06-19T11:20:37.079Z\r\n- Source path: F:\\AI\\interviewMentor\r\n- Files included: 29\r\n- Files skipped (> 250 KB): 0\r\n\r\n## Detected stack & packages\r\n\r\n### npm - client\\package.json\r\n**name** interview-mentor-client\r\n**dependencies**\r\n- react ^18.3.1\r\n- react-dom ^18.3.1\r\n- react-router-dom ^6.26.0\r\n**devDependencies**\r\n- @vitejs/plugin-react ^4.7.0\r\n- vite ^6.4.3\r\n### npm - server\\package.json\r\n**name** interview-mentor-server\r\n**dependencies**\r\n- @supabase/supabase-js ^2.45.0\r\n- cors ^2.8.5\r\n- dotenv ^16.4.5\r\n- express ^4.19.2\r\n\r\n## File type breakdown\r\n\r\n- .js: 11\r\n- .jsx: 9\r\n- .json: 4\r\n- (none): 1\r\n- .html: 1\r\n- .css: 1\r\n- .md: 1\r\n- .sql: 1\r\n\r\n## File tree\r\n\r\n```\r\n|-- .gitignore\r\n|-- README.md\r\n|-- client\r\n|   |-- index.html\r\n|   |-- package.json\r\n|   |-- src\r\n|   |   |-- App.jsx\r\n|   |   |-- api.js\r\n|   |   |-- components\r\n|   |   |   `-- States.jsx\r\n|   |   |-- main.jsx\r\n|   |   |-- pages\r\n|   |   |   |-- Applications.jsx\r\n|   |   |   |-- Progress.jsx\r\n|   |   |   |-- Questions.jsx\r\n|   |   |   |-- Roadmap.jsx\r\n|   |   |   |-- Speaking.jsx\r\n|   |   |   `-- Today.jsx\r\n|   |   `-- styles.css\r\n|   `-- vite.config.js\r\n`-- server\r\n    |-- db\r\n    |   `-- schema.sql\r\n    |-- package.json\r\n    `-- src\r\n        |-- data\r\n        |   |-- roadmap.json\r\n        |   `-- taskBank.json\r\n        |-- groq.js\r\n        |-- index.js\r\n        |-- notion.js\r\n        |-- planner.js\r\n        |-- routes\r\n        |   |-- ai.js\r\n        |   |-- data.js\r\n        |   `-- today.js\r\n        |-- setup-notion.js\r\n        `-- supabase.js\r\n```\r\n\r\n## Source files\r\n\r\n### .gitignore\r\n\r\n````\r\n# dependencies\r\nnode_modules/\r\n**/node_modules/\r\n# build output\r\ndist/\r\n**/dist/\r\n# env / secrets\r\n.env\r\n.env.local\r\n**/.env\r\n**/.env.local\r\n# logs / os\r\n*.log\r\n.DS_Store\r\n\r\n````\r\n\r\n### client\\index.html\r\n\r\n````html\r\n\u003c!doctype html>\r\n\u003chtml lang=\"en\">\r\n  \u003chead>\r\n    \u003cmeta charset=\"UTF-8\" />\r\n    \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\r\n    \u003ctitle>Mentor — daily prep\u003c/title>\r\n    \u003clink rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />\r\n    \u003clink rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />\r\n    \u003clink href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap\" rel=\"stylesheet\" />\r\n  \u003c/head>\r\n  \u003cbody>\r\n    \u003cdiv id=\"root\">\u003c/div>\r\n    \u003cscript type=\"module\" src=\"/src/main.jsx\">\u003c/script>\r\n  \u003c/body>\r\n\u003c/html>\r\n\r\n````\r\n\r\n### client\\package.json\r\n\r\n````json\r\n{\r\n  \"name\": \"interview-mentor-client\",\r\n  \"private\": true,\r\n  \"version\": \"1.0.0\",\r\n  \"type\": \"module\",\r\n  \"scripts\": {\r\n    \"dev\": \"vite\",\r\n    \"build\": \"vite build\",\r\n    \"preview\": \"vite preview\"\r\n  },\r\n  \"dependencies\": {\r\n    \"react\": \"^18.3.1\",\r\n    \"react-dom\": \"^18.3.1\",\r\n    \"react-router-dom\": \"^6.26.0\"\r\n  },\r\n  \"devDependencies\": {\r\n    \"@vitejs/plugin-react\": \"^4.7.0\",\r\n    \"vite\": \"^6.4.3\"\r\n  }\r\n}\r\n\r\n````\r\n\r\n### client\\src\\api.js\r\n\r\n````javascript\r\nconst BASE = import.meta.env.VITE_API_URL || 'http://localhost:4000';\r\nconst PASSCODE = import.meta.env.VITE_APP_PASSCODE || '';\r\n\r\nasync function req(path, { method = 'GET', body } = {}) {\r\n  let res;\r\n  try {\r\n    res = await fetch(BASE + path, {\r\n      method,\r\n      headers: {\r\n        'Content-Type': 'application/json',\r\n        'x-app-passcode': PASSCODE\r\n      },\r\n      body: body ? JSON.stringify(body) : undefined\r\n    });\r\n  } catch (e) {\r\n    console.error('[api] backend request failed', e);\r\n    throw new Error(`Could not reach the backend at ${BASE}. Start the server and check VITE_API_URL.`);\r\n  }\r\n\r\n  const data = await res.json().catch(() => ({}));\r\n  if (!res.ok) {\r\n    const message = data.error || `Request failed (${res.status})`;\r\n    console.error('[api] request failed', { path, status: res.status, message });\r\n    throw new Error(message);\r\n  }\r\n  return data;\r\n}\r\n\r\nexport const api = {\r\n  health: () => req('/api/health'),\r\n\r\n  // today\r\n  getToday: (date) => req('/api/today' + (date ? `?date=${date}` : '')),\r\n  toggleTask: (id) => req(`/api/task/${id}/toggle`, { method: 'POST' }),\r\n  setMode: (date, mode) => req('/api/day/mode', { method: 'POST', body: { date, mode } }),\r\n  saveLog: (body) => req('/api/log', { method: 'POST', body }),\r\n  setStatus: (date, status) => req('/api/day/status', { method: 'POST', body: { date, status } }),\r\n\r\n  // ai\r\n  replan: (body) => req('/api/ai/replan', { method: 'POST', body }),\r\n  sendNote: (body) => req('/api/ai/note', { method: 'POST', body }),\r\n  getNotes: () => req('/api/ai/notes'),\r\n  mock: (body) => req('/api/ai/mock', { method: 'POST', body }),\r\n\r\n  // data\r\n  roadmap: () => req('/api/roadmap'),\r\n  progress: () => req('/api/progress'),\r\n  list: (table) => req(`/api/${table}`),\r\n  create: (table, body) => req(`/api/${table}`, { method: 'POST', body }),\r\n  update: (table, id, body) => req(`/api/${table}/${id}`, { method: 'PUT', body }),\r\n  remove: (table, id) => req(`/api/${table}/${id}`, { method: 'DELETE' })\r\n};\r\n\r\n````\r\n\r\n### client\\src\\App.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { NavLink, Routes, Route } from 'react-router-dom';\r\nimport Today from './pages/Today.jsx';\r\nimport Roadmap from './pages/Roadmap.jsx';\r\nimport Questions from './pages/Questions.jsx';\r\nimport Applications from './pages/Applications.jsx';\r\nimport Speaking from './pages/Speaking.jsx';\r\nimport Progress from './pages/Progress.jsx';\r\nimport { api } from './api.js';\r\n\r\nconst tabs = [\r\n  ['/', 'Today'],\r\n  ['/roadmap', 'Roadmap'],\r\n  ['/questions', 'Questions'],\r\n  ['/applications', 'Applications'],\r\n  ['/speaking', 'Speaking'],\r\n  ['/progress', 'Progress']\r\n];\r\n\r\nfunction SetupStatus() {\r\n  const [state, setState] = useState({ status: 'checking', message: 'Checking backend...' });\r\n\r\n  useEffect(() => {\r\n    let active = true;\r\n    api.health()\r\n      .then((health) => {\r\n        if (!active) return;\r\n        if (!health.config?.database) {\r\n          setState({ status: 'warn', message: 'Database setup needed: add Supabase keys in server/.env.' });\r\n          return;\r\n        }\r\n        if (!health.config?.ai) {\r\n          setState({ status: 'soft', message: 'Core app ready. Add GROQ_API_KEY later to enable AI coaching.' });\r\n          return;\r\n        }\r\n        setState({ status: 'ok', message: 'Backend connected.' });\r\n      })\r\n      .catch((e) => {\r\n        if (!active) return;\r\n        setState({ status: 'bad', message: e.message });\r\n      });\r\n    return () => { active = false; };\r\n  }, []);\r\n\r\n  return (\r\n    \u003cdiv className={`setup-status ${state.status}`}>\r\n      \u003cspan className=\"status-dot\" aria-hidden=\"true\" />\r\n      \u003cspan>{state.message}\u003c/span>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\nexport default function App() {\r\n  return (\r\n    \u003cdiv className=\"shell\">\r\n      \u003cdiv className=\"topbar\">\r\n        \u003cdiv className=\"brand\">\r\n          \u003cspan className=\"lamp\" />\r\n          \u003cb>Mentor\u003c/b>\r\n          \u003cspan>your daily prep, one screen\u003c/span>\r\n        \u003c/div>\r\n      \u003c/div>\r\n      \u003cSetupStatus />\r\n\r\n      \u003cnav className=\"tabs\">\r\n        {tabs.map(([to, label]) => (\r\n          \u003cNavLink key={to} to={to} end={to === '/'} className={({ isActive }) => isActive ? 'active' : ''}>\r\n            {label}\r\n          \u003c/NavLink>\r\n        ))}\r\n      \u003c/nav>\r\n\r\n      \u003cRoutes>\r\n        \u003cRoute path=\"/\" element={\u003cToday />} />\r\n        \u003cRoute path=\"/roadmap\" element={\u003cRoadmap />} />\r\n        \u003cRoute path=\"/questions\" element={\u003cQuestions />} />\r\n        \u003cRoute path=\"/applications\" element={\u003cApplications />} />\r\n        \u003cRoute path=\"/speaking\" element={\u003cSpeaking />} />\r\n        \u003cRoute path=\"/progress\" element={\u003cProgress />} />\r\n      \u003c/Routes>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\components\\States.jsx\r\n\r\n````jsx\r\nexport function LoadingState({ children = 'Loading...' }) {\r\n  return (\r\n    \u003cdiv className=\"state-card\">\r\n      \u003cspan className=\"spinner\" aria-hidden=\"true\" />\r\n      \u003cspan>{children}\u003c/span>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\nexport function ErrorState({ title = 'Something went wrong', message, hint, onRetry }) {\r\n  return (\r\n    \u003cdiv className=\"card state-panel\">\r\n      \u003cdiv className=\"error-title\">{title}\u003c/div>\r\n      {message && \u003cp className=\"muted\">{message}\u003c/p>}\r\n      {hint && \u003cp className=\"faint\">{hint}\u003c/p>}\r\n      {onRetry && (\r\n        \u003cdiv className=\"error-actions\">\r\n          \u003cbutton className=\"btn sm\" onClick={onRetry}>Retry\u003c/button>\r\n        \u003c/div>\r\n      )}\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\nexport function InlineNotice({ tone = 'info', children }) {\r\n  return \u003cdiv className={`notice ${tone}`}>{children}\u003c/div>;\r\n}\r\n\r\n````\r\n\r\n### client\\src\\main.jsx\r\n\r\n````jsx\r\nimport React from 'react';\r\nimport { createRoot } from 'react-dom/client';\r\nimport { BrowserRouter } from 'react-router-dom';\r\nimport App from './App.jsx';\r\nimport './styles.css';\r\n\r\ncreateRoot(document.getElementById('root')).render(\r\n  \u003cReact.StrictMode>\r\n    \u003cBrowserRouter>\r\n      \u003cApp />\r\n    \u003c/BrowserRouter>\r\n  \u003c/React.StrictMode>\r\n);\r\n\r\n````\r\n\r\n### client\\src\\pages\\Applications.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nconst STATUSES = ['Applied', 'Screen', 'Tech', 'Final', 'Offer', 'Rejected'];\r\nconst SOURCES = ['LinkedIn', 'Naukri', 'Instahyre', 'Wellfound', 'Referral', 'Career page'];\r\n\r\nexport default function Applications() {\r\n  const [items, setItems] = useState([]);\r\n  const [err, setErr] = useState('');\r\n  const [loading, setLoading] = useState(true);\r\n  const [form, setForm] = useState({ company: '', role: '', location: '', source: 'LinkedIn', stack: '' });\r\n\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      setLoading(true);\r\n      const r = await api.list('applications');\r\n      setItems(r.items);\r\n    } catch (e) {\r\n      setErr(e.message);\r\n    } finally {\r\n      setLoading(false);\r\n    }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  async function add() {\r\n    if (!form.company.trim()) return;\r\n    try { await api.create('applications', form); setForm({ company: '', role: '', location: '', source: form.source, stack: '' }); load(); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function cycle(a) {\r\n    const next = STATUSES[(STATUSES.indexOf(a.status) + 1) % STATUSES.length];\r\n    setItems(items.map(i => i.id === a.id ? { ...i, status: next } : i));\r\n    try { await api.update('applications', a.id, { status: next }); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function del(id) { try { await api.remove('applications', id); load(); } catch (e) { setErr(e.message); } }\r\n\r\n  const counts = STATUSES.map(s => ({ s, n: items.filter(i => i.status === s).length }));\r\n\r\n  if (loading) return \u003cLoadingState>Loading applications...\u003c/LoadingState>;\r\n  if (err && items.length === 0) {\r\n    return (\r\n      \u003cErrorState\r\n        title=\"Applications need the database\"\r\n        message={err}\r\n        hint=\"Add Supabase credentials in server/.env, then restart the backend.\"\r\n        onRetry={load}\r\n      />\r\n    );\r\n  }\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      \u003ch2 className=\"section-title\">Applications\u003c/h2>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 14 }}>\r\n        \u003cdiv className=\"row\">\r\n          {counts.map(c => \u003cspan key={c.s} className=\"pill\">{c.s}: {c.n}\u003c/span>)}\r\n        \u003c/div>\r\n      \u003c/div>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 16 }}>\r\n        \u003cdiv className=\"row\" style={{ marginBottom: 8 }}>\r\n          \u003cinput placeholder=\"Company\" value={form.company} onChange={e => setForm({ ...form, company: e.target.value })} />\r\n          \u003cinput placeholder=\"Role\" value={form.role} onChange={e => setForm({ ...form, role: e.target.value })} />\r\n        \u003c/div>\r\n        \u003cdiv className=\"row\" style={{ marginBottom: 8 }}>\r\n          \u003cinput placeholder=\"Location\" value={form.location} onChange={e => setForm({ ...form, location: e.target.value })} />\r\n          \u003cselect value={form.source} onChange={e => setForm({ ...form, source: e.target.value })} style={{ width: 'auto' }}>\r\n            {SOURCES.map(s => \u003coption key={s}>{s}\u003c/option>)}\r\n          \u003c/select>\r\n        \u003c/div>\r\n        \u003cinput placeholder=\"Stack (optional)\" value={form.stack} onChange={e => setForm({ ...form, stack: e.target.value })} />\r\n        \u003cdiv className=\"row\" style={{ marginTop: 10 }}>\u003cbutton className=\"btn primary\" onClick={add}>Add application\u003c/button>\u003c/div>\r\n      \u003c/div>\r\n\r\n      {err && \u003cdiv className=\"error\">{err}\u003c/div>}\r\n\r\n      {items.map(a => (\r\n        \u003cdiv key={a.id} className=\"list-item\">\r\n          \u003cdiv className=\"row\" style={{ justifyContent: 'space-between' }}>\r\n            \u003cdiv style={{ flex: 1 }}>\r\n              \u003cb>{a.company}\u003c/b> \u003cspan className=\"muted\">- {a.role || 'role n/a'}\u003c/span>\r\n              \u003cdiv className=\"faint\" style={{ marginTop: 3 }}>{[a.location, a.source, a.stack].filter(Boolean).join(' - ')}\u003c/div>\r\n            \u003c/div>\r\n            \u003cbutton className=\"chip sm\" onClick={() => cycle(a)}>{a.status}\u003c/button>\r\n          \u003c/div>\r\n          \u003cdiv className=\"row\" style={{ marginTop: 8 }}>\r\n            \u003cbutton className=\"btn sm ghost\" onClick={() => del(a.id)} style={{ color: 'var(--faint)' }}>Delete\u003c/button>\r\n          \u003c/div>\r\n        \u003c/div>\r\n      ))}\r\n      {items.length === 0 && \u003cp className=\"center-note\">No applications yet. Start light after week 3, serious after week 6.\u003c/p>}\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\pages\\Progress.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nexport default function Progress() {\r\n  const [p, setP] = useState(null);\r\n  const [err, setErr] = useState('');\r\n\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      setP(await api.progress());\r\n    } catch (e) {\r\n      setErr(e.message);\r\n    }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  if (err) {\r\n    return (\r\n      \u003cErrorState\r\n        title=\"Progress needs the database\"\r\n        message={err}\r\n        hint=\"Progress is calculated from Supabase days, tasks, questions, and applications.\"\r\n        onRetry={load}\r\n      />\r\n    );\r\n  }\r\n  if (!p) return \u003cLoadingState>Loading progress...\u003c/LoadingState>;\r\n\r\n  const recent = (p.series || []).slice(-28);\r\n  const maxPts = 3;\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      \u003ch2 className=\"section-title\">Progress\u003c/h2>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 14 }}>\r\n        \u003cdiv className=\"label-row\">\u003ch3>Last weeks\u003c/h3>\u003cspan className=\"faint\">amber = full - green = normal - dim = low\u003c/span>\u003c/div>\r\n        {recent.length === 0\r\n          ? \u003cp className=\"muted\">No days logged yet. Close your first day on the Today tab.\u003c/p>\r\n          : \u003cdiv className=\"bars\">\r\n              {recent.map((s, i) => (\r\n                \u003cdiv key={i} className={`bar ${s.points > 0 ? s.mode : ''}`}\r\n                  style={{ height: `${Math.max(s.points / maxPts * 100, 4)}%` }}\r\n                  title={`${s.date}: ${s.status} (${s.points} pts)`} />\r\n              ))}\r\n            \u003c/div>}\r\n      \u003c/div>\r\n\r\n      \u003cdiv className=\"stat-grid\">\r\n        \u003cdiv className=\"stat\">\u003cdiv className=\"n\" style={{ color: 'var(--sage)' }}>{p.streak}\u003c/div>\u003cdiv className=\"k\">current chain (days)\u003c/div>\u003c/div>\r\n        \u003cdiv className=\"stat\">\u003cdiv className=\"n\" style={{ color: 'var(--amber)' }}>{p.totalPoints}\u003c/div>\u003cdiv className=\"k\">total points\u003c/div>\u003c/div>\r\n        \u003cdiv className=\"stat\">\u003cdiv className=\"n\">{p.daysEngaged}\u003c/div>\u003cdiv className=\"k\">days kept alive\u003c/div>\u003c/div>\r\n        \u003cdiv className=\"stat\">\u003cdiv className=\"n\">{p.canAnswer}/{p.questionsCount}\u003c/div>\u003cdiv className=\"k\">questions you can answer\u003c/div>\u003c/div>\r\n      \u003c/div>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginTop: 14 }}>\r\n        \u003cp className=\"muted\" style={{ margin: 0 }}>Weekly target: 8 points minimum, 12 good, 16+ excellent. Full day = 3, normal = 2, low = 1. Uneven days are fine. Disappearing for many days is the only real failure.\u003c/p>\r\n      \u003c/div>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginTop: 14 }}>\r\n        \u003cdiv className=\"row\" style={{ justifyContent: 'space-between' }}>\r\n          \u003cspan className=\"muted\">Applications in flight\u003c/span>\r\n          \u003cb style={{ fontFamily: 'var(--display)', fontSize: 18 }}>{p.applications}\u003c/b>\r\n        \u003c/div>\r\n      \u003c/div>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\pages\\Questions.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nconst STATUSES = ['New', 'Learning', 'Can Answer', 'Mock Passed'];\r\nconst TOPICS = ['C#', '.NET', 'SQL', 'DSA', 'Azure', 'AI', 'React', 'Angular', 'Behavioral', 'Project'];\r\n\r\nexport default function Questions() {\r\n  const [items, setItems] = useState([]);\r\n  const [err, setErr] = useState('');\r\n  const [loading, setLoading] = useState(true);\r\n  const [form, setForm] = useState({ topic: 'C#', difficulty: 'Easy', question: '' });\r\n  const [open, setOpen] = useState(null);\r\n  const [answers, setAnswers] = useState({});\r\n\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      setLoading(true);\r\n      const r = await api.list('questions');\r\n      setItems(r.items);\r\n    } catch (e) {\r\n      setErr(e.message);\r\n    } finally {\r\n      setLoading(false);\r\n    }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  async function add() {\r\n    if (!form.question.trim()) return;\r\n    try { await api.create('questions', form); setForm({ ...form, question: '' }); load(); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function cycleStatus(q) {\r\n    const next = STATUSES[(STATUSES.indexOf(q.status) + 1) % STATUSES.length];\r\n    setItems(items.map(i => i.id === q.id ? { ...i, status: next } : i));\r\n    try { await api.update('questions', q.id, { status: next }); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function saveAnswer(q, my_answer) {\r\n    try { await api.update('questions', q.id, { my_answer, last_practiced: new Date().toISOString().slice(0, 10) }); load(); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function del(id) { try { await api.remove('questions', id); load(); } catch (e) { setErr(e.message); } }\r\n\r\n  function toggleAnswer(q) {\r\n    setOpen(open === q.id ? null : q.id);\r\n    setAnswers(prev => ({ ...prev, [q.id]: prev[q.id] ?? q.my_answer ?? '' }));\r\n  }\r\n\r\n  if (loading) return \u003cLoadingState>Loading question bank...\u003c/LoadingState>;\r\n  if (err && items.length === 0) {\r\n    return (\r\n      \u003cErrorState\r\n        title=\"Question bank needs the database\"\r\n        message={err}\r\n        hint=\"Add Supabase credentials in server/.env, then restart the backend.\"\r\n        onRetry={load}\r\n      />\r\n    );\r\n  }\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      \u003ch2 className=\"section-title\">Question bank\u003c/h2>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 16 }}>\r\n        \u003cdiv className=\"row\" style={{ marginBottom: 8 }}>\r\n          \u003cselect value={form.topic} onChange={e => setForm({ ...form, topic: e.target.value })} style={{ width: 'auto', flex: 1 }}>\r\n            {TOPICS.map(t => \u003coption key={t}>{t}\u003c/option>)}\r\n          \u003c/select>\r\n          \u003cselect value={form.difficulty} onChange={e => setForm({ ...form, difficulty: e.target.value })} style={{ width: 'auto' }}>\r\n            \u003coption>Easy\u003c/option>\u003coption>Medium\u003c/option>\u003coption>Hard\u003c/option>\r\n          \u003c/select>\r\n        \u003c/div>\r\n        \u003cinput placeholder=\"Add a question you got asked or fear...\" value={form.question}\r\n          onChange={e => setForm({ ...form, question: e.target.value })}\r\n          onKeyDown={e => e.key === 'Enter' && add()} />\r\n        \u003cdiv className=\"row\" style={{ marginTop: 10 }}>\u003cbutton className=\"btn primary\" onClick={add}>Add question\u003c/button>\u003c/div>\r\n      \u003c/div>\r\n\r\n      {err && \u003cdiv className=\"error\">{err}\u003c/div>}\r\n\r\n      {items.map(q => (\r\n        \u003cdiv key={q.id} className=\"list-item\">\r\n          \u003cdiv className=\"row\" style={{ justifyContent: 'space-between' }}>\r\n            \u003cdiv style={{ flex: 1 }}>\r\n              \u003cspan className=\"pill\" style={{ marginRight: 8 }}>{q.topic}\u003c/span>\r\n              \u003cspan className=\"faint\">{q.difficulty}\u003c/span>\r\n              \u003cdiv style={{ marginTop: 6, fontWeight: 500 }}>{q.question}\u003c/div>\r\n            \u003c/div>\r\n            \u003cbutton className=\"chip sm\" onClick={() => cycleStatus(q)} title=\"Click to advance\">{q.status}\u003c/button>\r\n          \u003c/div>\r\n          \u003cdiv className=\"row\" style={{ marginTop: 8 }}>\r\n            \u003cbutton className=\"btn sm ghost\" onClick={() => toggleAnswer(q)}>{open === q.id ? 'Hide' : 'My answer'}\u003c/button>\r\n            \u003cbutton className=\"btn sm ghost\" onClick={() => del(q.id)} style={{ color: 'var(--faint)' }}>Delete\u003c/button>\r\n          \u003c/div>\r\n          {open === q.id && (\r\n            \u003cdiv style={{ marginTop: 10 }}>\r\n              \u003ctextarea\r\n                value={answers[q.id] ?? ''}\r\n                placeholder=\"Write your answer in your own words...\"\r\n                onChange={e => setAnswers(prev => ({ ...prev, [q.id]: e.target.value }))}\r\n              />\r\n              \u003cbutton className=\"btn sm\" style={{ marginTop: 8 }}\r\n                onClick={() => saveAnswer(q, answers[q.id] ?? '')}>Save answer\u003c/button>\r\n            \u003c/div>\r\n          )}\r\n        \u003c/div>\r\n      ))}\r\n      {items.length === 0 && \u003cp className=\"center-note\">No questions yet. Add the ones that scare you most.\u003c/p>}\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\pages\\Roadmap.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nexport default function Roadmap() {\r\n  const [data, setData] = useState(null);\r\n  const [err, setErr] = useState('');\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      setData(await api.roadmap());\r\n    } catch (e) {\r\n      setErr(e.message);\r\n    }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  if (err) return \u003cErrorState title=\"Could not load roadmap\" message={err} onRetry={load} />;\r\n  if (!data) return \u003cLoadingState>Loading roadmap...\u003c/LoadingState>;\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      \u003ch2 className=\"section-title\">The 90-day spine\u003c/h2>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 14 }}>\r\n        \u003cdiv className=\"eyebrow\">Days 1–14\u003c/div>\r\n        \u003cp className=\"muted\" style={{ marginTop: 6 }}>Rehabilitation. Restart your hands and your voice — C# basics, SQL basics, JS basics, first mock. Do not judge yourself in these two weeks.\u003c/p>\r\n      \u003c/div>\r\n\r\n      {data.phases.map(p => (\r\n        \u003cdiv key={p.week} className=\"list-item\">\r\n          \u003cdiv className=\"row\" style={{ justifyContent: 'space-between' }}>\r\n            \u003cb style={{ fontFamily: 'var(--display)' }}>Week {p.week} — {p.name}\u003c/b>\r\n            \u003cspan className=\"pill\">Day {p.startDay}–{p.endDay}\u003c/span>\r\n          \u003c/div>\r\n          \u003cp className=\"muted\" style={{ margin: '6px 0 0' }}>{p.focus}\u003c/p>\r\n        \u003c/div>\r\n      ))}\r\n\r\n      \u003ch2 className=\"section-title\" style={{ marginTop: 26 }}>Rules before motivation\u003c/h2>\r\n      \u003cdiv className=\"card\">\r\n        {data.consistencyRules.map((r, i) => (\r\n          \u003cp key={i} className=\"muted\" style={{ margin: i ? '10px 0 0' : 0 }}>- {r}\u003c/p>\r\n        ))}\r\n      \u003c/div>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\pages\\Speaking.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nconst PROMPTS = ['Tell me about yourself', 'Why are you looking for change?', 'Explain a project (STAR)', 'Explain a technical concept', 'What if you do not know?'];\r\n\r\nexport default function Speaking() {\r\n  const [items, setItems] = useState([]);\r\n  const [err, setErr] = useState('');\r\n  const [loading, setLoading] = useState(true);\r\n  const [form, setForm] = useState({ prompt: PROMPTS[0], duration_s: 75, clarity: 3, pace: 3, confidence: 3, one_fix: '' });\r\n  const [mock, setMock] = useState(null);\r\n  const [mockBusy, setMockBusy] = useState(false);\r\n\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      setLoading(true);\r\n      const r = await api.list('recordings');\r\n      setItems(r.items);\r\n    } catch (e) {\r\n      setErr(e.message);\r\n    } finally {\r\n      setLoading(false);\r\n    }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  async function add() {\r\n    try { await api.create('recordings', form); setForm({ ...form, one_fix: '' }); load(); } catch (e) { setErr(e.message); }\r\n  }\r\n  async function runMock() {\r\n    setMockBusy(true); setMock(null);\r\n    try { setMock(await api.mock({})); } catch (e) { setErr(e.message); }\r\n    setMockBusy(false);\r\n  }\r\n\r\n  const Scale = ({ k, label }) => (\r\n    \u003cdiv className=\"row\" style={{ marginBottom: 6 }}>\r\n      \u003cspan className=\"faint\" style={{ width: 84 }}>{label}\u003c/span>\r\n      {[1, 2, 3, 4, 5].map(n => (\r\n        \u003cbutton key={n} className={`chip scale ${form[k] === n ? 'on' : ''}`} onClick={() => setForm({ ...form, [k]: n })}>{n}\u003c/button>\r\n      ))}\r\n    \u003c/div>\r\n  );\r\n\r\n  if (loading) return \u003cLoadingState>Loading speaking log...\u003c/LoadingState>;\r\n  if (err && items.length === 0 && !mock) {\r\n    return (\r\n      \u003cErrorState\r\n        title=\"Speaking log needs the database\"\r\n        message={err}\r\n        hint=\"Add Supabase credentials in server/.env for logs. The mock generator also needs GROQ_API_KEY.\"\r\n        onRetry={load}\r\n      />\r\n    );\r\n  }\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      \u003ch2 className=\"section-title\">Speaking\u003c/h2>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 14 }}>\r\n        \u003cdiv className=\"label-row\">\u003ch3>Generate a 4-question mock\u003c/h3>\r\n          \u003cbutton className=\"btn sm\" onClick={runMock} disabled={mockBusy}>{mockBusy ? '…' : 'New mock'}\u003c/button>\u003c/div>\r\n        {mock?.error && \u003cdiv className=\"error\">{mock.error}\u003c/div>}\r\n        {mock?.intro && \u003cp className=\"muted\" style={{ marginTop: 6 }}>{mock.intro}\u003c/p>}\r\n        {mock?.questions?.map((q, i) => (\r\n          \u003cdiv key={i} className=\"list-item\" style={{ marginTop: 8 }}>\r\n            \u003cspan className=\"pill\">{q.area}\u003c/span>\r\n            \u003cdiv style={{ fontWeight: 500, marginTop: 6 }}>{q.question}\u003c/div>\r\n            \u003cdiv className=\"faint\" style={{ marginTop: 4 }}>Good answer: {q.what_good_looks_like}\u003c/div>\r\n          \u003c/div>\r\n        ))}\r\n      \u003c/div>\r\n\r\n      \u003cdiv className=\"card\" style={{ marginBottom: 16 }}>\r\n        \u003cdiv className=\"label-row\">\u003ch3>Log a recording\u003c/h3>\u003c/div>\r\n        \u003cselect value={form.prompt} onChange={e => setForm({ ...form, prompt: e.target.value })} style={{ marginBottom: 10 }}>\r\n          {PROMPTS.map(p => \u003coption key={p}>{p}\u003c/option>)}\r\n        \u003c/select>\r\n        \u003cScale k=\"clarity\" label=\"Clarity\" />\r\n        \u003cScale k=\"pace\" label=\"Pace\" />\r\n        \u003cScale k=\"confidence\" label=\"Confidence\" />\r\n        \u003cinput placeholder=\"One fix for next time\" value={form.one_fix} onChange={e => setForm({ ...form, one_fix: e.target.value })} style={{ marginTop: 6 }} />\r\n        \u003cdiv className=\"row\" style={{ marginTop: 10 }}>\u003cbutton className=\"btn primary\" onClick={add}>Log it\u003c/button>\u003c/div>\r\n      \u003c/div>\r\n\r\n      {err && \u003cdiv className=\"error\">{err}\u003c/div>}\r\n\r\n      {items.map(r => (\r\n        \u003cdiv key={r.id} className=\"list-item\">\r\n          \u003cdiv className=\"row\" style={{ justifyContent: 'space-between' }}>\r\n            \u003cb>{r.prompt}\u003c/b>\r\n            \u003cspan className=\"faint\">{new Date(r.created_at).toLocaleDateString()}\u003c/span>\r\n          \u003c/div>\r\n          \u003cdiv className=\"faint\" style={{ marginTop: 4 }}>clarity {r.clarity} - pace {r.pace} - confidence {r.confidence}\u003c/div>\r\n          {r.one_fix && \u003cdiv className=\"muted\" style={{ marginTop: 4 }}>Fix: {r.one_fix}\u003c/div>}\r\n        \u003c/div>\r\n      ))}\r\n      {items.length === 0 && \u003cp className=\"center-note\">No recordings logged yet. Record one answer today — even 30 seconds counts.\u003c/p>}\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\pages\\Today.jsx\r\n\r\n````jsx\r\nimport { useEffect, useState } from 'react';\r\nimport { api } from '../api.js';\r\nimport { ErrorState, LoadingState } from '../components/States.jsx';\r\n\r\nconst MODES = [['full', 'Full - 2h'], ['normal', 'Normal - 90m'], ['low', 'Low - 20m']];\r\n\r\nfunction Chain({ series }) {\r\n  const recent = (series || []).slice(-21);\r\n  if (!recent.length) {\r\n    return \u003cdiv className=\"chain-label\">Your chain starts today. The only bad day is disappearing for many in a row.\u003c/div>;\r\n  }\r\n  const alive = recent.filter(s => s.points > 0).length;\r\n  return (\r\n    \u003cdiv className=\"chain-wrap\">\r\n      \u003cdiv className=\"chain\">\r\n        {recent.map((s, i) => {\r\n          const cls = s.points === 0 ? (s.status === 'rest' ? 'rest' : '') : s.mode;\r\n          return \u003cspan key={i} className={`link ${cls}`} title={`${s.date} - ${s.status}`} />;\r\n        })}\r\n      \u003c/div>\r\n      \u003cdiv className=\"chain-label\">\u003cb>{alive}\u003c/b> days kept alive\u003c/div>\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\nexport default function Today() {\r\n  const [data, setData] = useState(null);\r\n  const [series, setSeries] = useState([]);\r\n  const [err, setErr] = useState('');\r\n  const [busy, setBusy] = useState(false);\r\n  const [msg, setMsg] = useState('');\r\n\r\n  const [energy, setEnergy] = useState(null);\r\n  const [mood, setMood] = useState(null);\r\n\r\n  const [note, setNote] = useState('');\r\n  const [noteTopic, setNoteTopic] = useState('');\r\n  const [feedback, setFeedback] = useState(null);\r\n  const [noteBusy, setNoteBusy] = useState(false);\r\n\r\n  async function load() {\r\n    try {\r\n      setErr('');\r\n      const [t, p] = await Promise.all([api.getToday(), api.progress().catch(() => ({ series: [] }))]);\r\n      setData(t);\r\n      setSeries(p.series || []);\r\n      if (t.log) { setEnergy(t.log.energy); setMood(t.log.mood); }\r\n    } catch (e) { setErr(e.message); }\r\n  }\r\n  useEffect(() => { load(); }, []);\r\n\r\n  if (!data && err) {\r\n    const setupHint = err.includes('Database is not configured')\r\n      ? 'Copy server/.env.example to server/.env, add your Supabase URL and service role key, then restart the backend.'\r\n      : 'Check that the backend is running and your client/server passcodes match.';\r\n    return \u003cErrorState title=\"Today needs setup\" message={err} hint={setupHint} onRetry={load} />;\r\n  }\r\n  if (!data) return \u003cLoadingState>Loading today...\u003c/LoadingState>;\r\n\r\n  const { day, tasks, plan } = data;\r\n  const beforeStart = plan?.beforeStart;\r\n  const doneCount = tasks.filter(t => t.done).length;\r\n\r\n  async function toggle(id) {\r\n    setErr('');\r\n    setData(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) }));\r\n    try { await api.toggleTask(id); } catch (e) { setErr(e.message); load(); }\r\n  }\r\n\r\n  async function chooseMode(m) {\r\n    setData(d => ({ ...d, day: { ...d.day, mode: m } }));\r\n    try { await api.setMode(day.the_date, m); } catch (e) { setErr(`Could not save mode: ${e.message}`); }\r\n  }\r\n\r\n  async function setScale(kind, val) {\r\n    const e = kind === 'energy' ? val : energy;\r\n    const mo = kind === 'mood' ? val : mood;\r\n    if (kind === 'energy') setEnergy(val); else setMood(val);\r\n    try {\r\n      await api.saveLog({ date: day.the_date, energy: e, mood: mo });\r\n    } catch (e) {\r\n      console.warn('[today] check-in save failed', e);\r\n      setErr(`Could not save check-in: ${e.message}`);\r\n    }\r\n  }\r\n\r\n  async function replan() {\r\n    setBusy(true); setMsg(''); setErr('');\r\n    try {\r\n      const minutes = day.mode === 'low' ? 20 : day.mode === 'full' ? 120 : 90;\r\n      const out = await api.replan({ date: day.the_date, energy, mood, minutes });\r\n      setData(d => ({ ...d, tasks: out.tasks, day: { ...d.day, mode: out.mode || d.day.mode } }));\r\n      setMsg(out.message || 'Re-planned for today.');\r\n    } catch (e) { setErr(e.message); }\r\n    setBusy(false);\r\n  }\r\n\r\n  async function sendNote() {\r\n    if (!note.trim()) return;\r\n    setNoteBusy(true); setFeedback(null); setErr('');\r\n    try {\r\n      const out = await api.sendNote({ topic: noteTopic, content: note });\r\n      setFeedback(out.note);\r\n      setNote('');\r\n    } catch (e) { setErr(e.message); }\r\n    setNoteBusy(false);\r\n  }\r\n\r\n  async function finishDay(status) {\r\n    setBusy(true); setErr('');\r\n    try {\r\n      await api.setStatus(day.the_date, status);\r\n      setMsg(status === 'done' ? 'Day marked done. Chain alive.' : status === 'rest' ? 'Rest day logged. No guilt.' : 'Logged.');\r\n      const p = await api.progress().catch(() => ({ series: [] }));\r\n      setSeries(p.series || []);\r\n    } catch (e) { setErr(e.message); }\r\n    setBusy(false);\r\n  }\r\n\r\n  const today = new Date(day.the_date + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });\r\n\r\n  return (\r\n    \u003cdiv className=\"fade-in\">\r\n      {err && (\r\n        \u003cdiv className=\"card\" style={{ borderColor: '#5a342f', marginBottom: 14 }}>\r\n          \u003cdiv className=\"row\" style={{ justifyContent: 'space-between', alignItems: 'flex-start' }}>\r\n            \u003cdiv className=\"error\" style={{ margin: 0 }}>{err}\u003c/div>\r\n            \u003cbutton className=\"btn sm ghost\" onClick={() => setErr('')}>Dismiss\u003c/button>\r\n          \u003c/div>\r\n        \u003c/div>\r\n      )}\r\n      \u003cdiv className=\"card\">\r\n        \u003cdiv className=\"eyebrow\">{day.week_label || 'Plan'}{!beforeStart && ` - Day ${day.day_index}`}\u003c/div>\r\n        \u003ch1 className=\"day-title\">{today}\u003c/h1>\r\n        \u003cp className=\"focus\">{day.focus}\u003c/p>\r\n        \u003cChain series={series} />\r\n      \u003c/div>\r\n\r\n      {beforeStart ? (\r\n        \u003cdiv className=\"card\">\u003cp className=\"muted\">Your 90-day plan begins on its start date. Update \u003ccode>PLAN_START_DATE\u003c/code> in the backend \u003ccode>.env\u003c/code> if you want to begin today.\u003c/p>\u003c/div>\r\n      ) : (\r\n        \u003c>\r\n          \u003cdiv className=\"card\">\r\n            \u003cdiv className=\"label-row\">\r\n              \u003ch3>Today's mode\u003c/h3>\r\n              \u003cspan className=\"faint\">{doneCount}/{tasks.length} done\u003c/span>\r\n            \u003c/div>\r\n            \u003cdiv className=\"row\">\r\n              {MODES.map(([m, label]) => (\r\n                \u003cbutton key={m} className={`chip ${day.mode === m ? 'on' : ''}`} onClick={() => chooseMode(m)}>{label}\u003c/button>\r\n              ))}\r\n            \u003c/div>\r\n\r\n            \u003cdiv className=\"divider\" />\r\n\r\n            \u003cdiv className=\"label-row\">\u003ch3>How are you today?\u003c/h3>\u003c/div>\r\n            \u003cdiv className=\"row\" style={{ marginBottom: 8 }}>\r\n              \u003cspan className=\"faint\" style={{ width: 58 }}>Energy\u003c/span>\r\n              {[1, 2, 3, 4, 5].map(n => (\r\n                \u003cbutton key={n} className={`chip scale ${energy === n ? 'on' : ''}`} onClick={() => setScale('energy', n)}>{n}\u003c/button>\r\n              ))}\r\n            \u003c/div>\r\n            \u003cdiv className=\"row\">\r\n              \u003cspan className=\"faint\" style={{ width: 58 }}>Mood\u003c/span>\r\n              {[1, 2, 3, 4, 5].map(n => (\r\n                \u003cbutton key={n} className={`chip scale ${mood === n ? 'on' : ''}`} onClick={() => setScale('mood', n)}>{n}\u003c/button>\r\n              ))}\r\n            \u003c/div>\r\n          \u003c/div>\r\n\r\n          \u003cdiv className=\"card\">\r\n            \u003cdiv className=\"label-row\">\r\n              \u003ch3>Three things\u003c/h3>\r\n              \u003cbutton className=\"btn sm ghost\" onClick={replan} disabled={busy}>{busy ? '…' : '↻ Re-plan with AI'}\u003c/button>\r\n            \u003c/div>\r\n\r\n            {msg && \u003cdiv className=\"toast\" style={{ marginBottom: 10 }}>{msg}\u003c/div>}\r\n\r\n            {tasks.length === 0 && \u003cp className=\"muted\">No tasks for today. Try re-planning, or it may be a review day.\u003c/p>}\r\n\r\n            {tasks.map(t => (\r\n              \u003cdiv key={t.id} className={`task ${t.done ? 'done' : ''}`} onClick={() => toggle(t.id)}>\r\n                \u003cdiv className=\"check\">✓\u003c/div>\r\n                \u003cdiv style={{ flex: 1 }}>\r\n                  \u003cspan className={`kind-tag kind-${t.kind}`}>{t.kind}\u003c/span>\r\n                  \u003cdiv className=\"task-title\">{t.title}\u003c/div>\r\n                  \u003cp className=\"task-detail\">{t.detail}\u003c/p>\r\n                  \u003cdiv className=\"task-meta\">\r\n                    {t.minutes ? \u003cspan className=\"min\">{t.minutes} min\u003c/span> : null}\r\n                    {t.resource_url ? \u003ca href={t.resource_url} target=\"_blank\" rel=\"noreferrer\" onClick={e => e.stopPropagation()}>open resource �-\u003c/a> : null}\r\n                  \u003c/div>\r\n                \u003c/div>\r\n              \u003c/div>\r\n            ))}\r\n          \u003c/div>\r\n\r\n          \u003cdiv className=\"card\">\r\n            \u003cdiv className=\"label-row\">\u003ch3>Paste what you learned\u003c/h3>\u003c/div>\r\n            \u003cp className=\"faint\" style={{ marginTop: -4, marginBottom: 10 }}>Notes, an answer you wrote, anything. You'll get quick feedback and a question to test yourself.\u003c/p>\r\n            \u003cinput placeholder=\"Topic (optional) — e.g. INNER JOIN\" value={noteTopic} onChange={e => setNoteTopic(e.target.value)} style={{ marginBottom: 8 }} />\r\n            \u003ctextarea placeholder=\"Type or paste here…\" value={note} onChange={e => setNote(e.target.value)} />\r\n            \u003cdiv className=\"row\" style={{ marginTop: 10 }}>\r\n              \u003cbutton className=\"btn primary\" onClick={sendNote} disabled={noteBusy || !note.trim()}>{noteBusy ? 'Thinking…' : 'Get feedback'}\u003c/button>\r\n            \u003c/div>\r\n            {feedback && (\r\n              \u003cdiv className=\"ai-box\">\r\n                \u003cdiv className=\"who\">Coach\u003c/div>\r\n                \u003cdiv>{feedback.ai_feedback || 'Saved. (AI feedback unavailable — check GROQ_API_KEY.)'}\u003c/div>\r\n                {feedback.follow_up && \u003cdiv className=\"follow\">Test yourself: {feedback.follow_up}\u003c/div>}\r\n                {feedback.restudy_flag && \u003cdiv className=\"restudy\" style={{ marginTop: 8 }}>Worth a re-study before moving on.\u003c/div>}\r\n              \u003c/div>\r\n            )}\r\n          \u003c/div>\r\n\r\n          \u003cdiv className=\"card\">\r\n            \u003cdiv className=\"label-row\">\u003ch3>Close the day\u003c/h3>\u003c/div>\r\n            \u003cdiv className=\"row\">\r\n              \u003cbutton className=\"btn sage\" onClick={() => finishDay('done')} disabled={busy}>Mark done\u003c/button>\r\n              \u003cbutton className=\"btn ghost\" onClick={() => finishDay('rest')} disabled={busy}>Rest day\u003c/button>\r\n            \u003c/div>\r\n            \u003cp className=\"faint\" style={{ marginTop: 10 }}>A tiny day still counts. Closing the day keeps your chain honest.\u003c/p>\r\n          \u003c/div>\r\n        \u003c/>\r\n      )}\r\n    \u003c/div>\r\n  );\r\n}\r\n\r\n````\r\n\r\n### client\\src\\styles.css\r\n\r\n````css\r\n:root {\r\n  --bg:        #0e1116;\r\n  --bg-2:      #141922;\r\n  --surface:   #1a2029;\r\n  --surface-2: #20262f;\r\n  --border:    #2a313c;\r\n  --border-soft:#222934;\r\n  --text:      #e8eaed;\r\n  --muted:     #9aa4b2;\r\n  --faint:     #6b7480;\r\n\r\n  --amber:     #e6a552;   /* the desk lamp — today / active */\r\n  --amber-dim: #3a2f1f;\r\n  --sage:      #84b06a;   /* done, kept alive */\r\n  --sage-dim:  #243019;\r\n\r\n  --code:      #6fb1d6;\r\n  --learn:     #b58fe0;\r\n  --speak:     #e0a366;\r\n\r\n  --radius:    14px;\r\n  --radius-sm: 9px;\r\n  --shadow:    0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 30px rgba(0,0,0,0.35);\r\n  --display: 'Space Grotesk', system-ui, sans-serif;\r\n  --body: 'Inter', system-ui, sans-serif;\r\n  --mono: ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;\r\n}\r\n\r\n* { box-sizing: border-box; }\r\nhtml, body, #root { height: 100%; }\r\nbody {\r\n  margin: 0;\r\n  background:\r\n    radial-gradient(1200px 600px at 70% -10%, rgba(230,165,82,0.06), transparent 60%),\r\n    var(--bg);\r\n  color: var(--text);\r\n  font-family: var(--body);\r\n  font-size: 15px;\r\n  line-height: 1.55;\r\n  -webkit-font-smoothing: antialiased;\r\n}\r\na { color: inherit; }\r\nbutton { font-family: inherit; cursor: pointer; }\r\n\r\n/* ---------- shell ---------- */\r\n.shell { max-width: 760px; margin: 0 auto; padding: 22px 18px 80px; }\r\n\r\n.topbar {\r\n  display: flex; align-items: center; justify-content: space-between;\r\n  margin-bottom: 18px;\r\n}\r\n.brand { display: flex; align-items: baseline; gap: 9px; }\r\n.brand b { font-family: var(--display); font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }\r\n.brand .lamp {\r\n  width: 9px; height: 9px; border-radius: 50%;\r\n  background: var(--amber); box-shadow: 0 0 12px 2px rgba(230,165,82,0.6);\r\n}\r\n.brand span { color: var(--faint); font-size: 12.5px; }\r\n\r\n/* ---------- nav ---------- */\r\nnav.tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 22px; }\r\nnav.tabs a {\r\n  text-decoration: none; color: var(--muted);\r\n  font-size: 13.5px; font-weight: 500;\r\n  padding: 7px 12px; border-radius: 99px;\r\n  border: 1px solid transparent;\r\n}\r\nnav.tabs a:hover { color: var(--text); background: var(--bg-2); }\r\nnav.tabs a.active {\r\n  color: var(--text); background: var(--surface);\r\n  border-color: var(--border);\r\n}\r\n\r\n/* ---------- cards ---------- */\r\n.card {\r\n  background: linear-gradient(180deg, var(--surface), var(--bg-2));\r\n  border: 1px solid var(--border);\r\n  border-radius: var(--radius);\r\n  box-shadow: var(--shadow);\r\n  padding: 18px;\r\n}\r\n.card + .card { margin-top: 14px; }\r\n\r\n.eyebrow {\r\n  font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase;\r\n  color: var(--amber); font-weight: 600;\r\n}\r\nh1.day-title { font-family: var(--display); font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin: 4px 0 6px; }\r\n.focus { color: var(--muted); font-size: 14px; margin: 0; }\r\n\r\n/* ---------- chain (signature) ---------- */\r\n.chain-wrap { display: flex; align-items: center; gap: 12px; margin-top: 16px; }\r\n.chain { display: flex; gap: 5px; flex-wrap: wrap; }\r\n.link {\r\n  width: 13px; height: 13px; border-radius: 4px;\r\n  background: transparent; border: 1.5px solid var(--border);\r\n}\r\n.link.full   { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 8px rgba(230,165,82,0.45); }\r\n.link.normal { background: var(--sage);  border-color: var(--sage); }\r\n.link.low    { background: var(--sage-dim); border-color: var(--sage); }\r\n.link.rest   { background: transparent; border-style: dashed; border-color: var(--faint); }\r\n.chain-label { font-size: 12.5px; color: var(--faint); white-space: nowrap; }\r\n.chain-label b { color: var(--sage); font-weight: 600; }\r\n\r\n/* ---------- mode chips ---------- */\r\n.row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }\r\n.label-row { display:flex; justify-content:space-between; align-items:center; margin
